spring.application.name=weatherapi

# AccuWeather (non-secret config)
# accuweather.api-key is injected from Vault
accuweather.base-url=https://dataservice.accuweather.com
accuweather.connect-timeout=5s
accuweather.read-timeout=10s

# Spring Cloud Vault
spring.cloud.vault.host=localhost
spring.cloud.vault.port=8200
spring.cloud.vault.scheme=http

# Authentication: token is read from SPRING_CLOUD_VAULT_TOKEN env var
# Run: export SPRING_CLOUD_VAULT_TOKEN=$(vault print token)
spring.cloud.vault.authentication=token

# KV secrets engine (v2 default)
spring.cloud.vault.kv.enabled=true
spring.cloud.vault.kv.backend=secret
spring.cloud.vault.kv.default-context=weatherapi

# Pull Vault secrets into Spring Environment at startup
spring.config.import=vault://